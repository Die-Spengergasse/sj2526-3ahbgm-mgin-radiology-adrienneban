<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reservations List</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
    <nav>
        <a href="/">Home</a>
        <a href="/patient/list">Patients</a>
        <a href="/device/list">Devices</a>
        <a href="/reservation/list">Reservations</a>
    </nav>
</header>
<div class="container">
    <h1>Reservations List</h1>
    <table>
        <thead>
            <tr>
                <th>Patient</th>
                <th>Device</th>
                <th>Start Time</th>
                <th>End Time</th>
                <th>Duration</th>
                <th>Notes</th>
                <th>Edit</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="r : ${reservations}">
                <td th:text="${r.patient.name} + ' ' + ${r.patient.surname}"></td>
                <td th:text="${r.device.displayName()}"></td>
                <td th:text="${#temporals.format(r.startTime, 'dd.MM.yyyy HH:mm')}"></td>
                <td th:text="${#temporals.format(r.endTime, 'dd.MM.yyyy HH:mm')}"></td>
                <td><span th:text="${r.getDurationMinutes()} + ' min'"></span></td>
                <td th:text="${r.comment}"></td>
                <td><a th:href="@{'/reservation/edit/' + ${r.id}}" class="btn" style="background:#f39c12;color:white;border-radius:5px;padding:0.3rem 0.75rem;text-decoration:none;font-weight:bold;">Edit</a></td>
                <td>
                    <form th:action="@{/reservation/delete/{id}(id=${r.id})}" method="post">
                        <input type="submit" value="Delete" style="background:#e74c3c;color:white;border:none;border-radius:5px;padding:0.3rem 0.75rem;cursor:pointer;font-weight:bold;">
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
    <div class="page-actions">
        <a href="/reservation/add" class="btn btn-primary">+ New Reservation</a>
        <a href="/" class="btn btn-secondary">← Home</a>
    </div>
</div>
</body>
</html>
