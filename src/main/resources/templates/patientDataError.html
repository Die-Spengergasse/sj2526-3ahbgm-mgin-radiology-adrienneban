<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Error: Patient Data</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <nav>
    <a href="/">Home</a>
    <a href="/patient/list">Patients</a>
    <a href="/device/list">Devices</a>
    <a href="/reservation/list">Reservations</a>
  </nav>
</header>
<div class="container">
  <h1>⚠️ Invalid Patient Data</h1>
  <div class="error-box">
    <p th:if="${error}" th:text="${error}"></p>
    <p th:unless="${error}">Please check your input (Birthdate, Social Security Number).</p>
  </div>
  <div class="page-actions">
    <a href="/patient/add" class="btn">← Try again</a>
    <a href="/patient/list" class="btn btn-secondary">Patient List</a>
  </div>
</div>
</body>
</html>
