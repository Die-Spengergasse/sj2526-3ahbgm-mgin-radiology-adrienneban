<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Device List</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
    <nav>
        <a href="/">Home</a>
        <a href="/patient/list">Patients</a>
        <a href="/device/list">Devices</a>
        <a href="/reservation/list">Reservations</a>
    </nav>
</header>
<div class="container">
    <h1>Device List</h1>
    <table>
        <thead>
            <tr>
                <th>Type</th>
                <th>Location</th>
                <th>Edit</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="d : ${devices}">
                <td th:text="${d.type}"></td>
                <td th:text="${d.location}"></td>
                <td><a th:href="@{'/device/edit/' + ${d.id}}" class="btn" style="background:#f39c12;color:white;border-radius:5px;padding:0.3rem 0.75rem;text-decoration:none;font-weight:bold;">Edit</a></td>
                <td>
                    <form th:action="@{/device/delete/{id}(id=${d.id})}" method="post">
                        <input type="submit" value="Delete" style="background:#e74c3c;color:white;border:none;border-radius:5px;padding:0.3rem 0.75rem;cursor:pointer;font-weight:bold;">
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
    <div class="page-actions">
        <a href="/device/add" class="btn btn-primary">+ New Device</a>
        <a href="/" class="btn btn-secondary">← Home</a>
    </div>
</div>
</body>
</html>
