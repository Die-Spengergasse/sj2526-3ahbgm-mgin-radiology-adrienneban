<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Device</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
    <nav>
        <a href="/">Home</a>
        <a href="/patient/list">Patients</a>
        <a href="/device/list">Devices</a>
        <a href="/reservation/list">Reservations</a>
    </nav>
</header>
<div class="container">
    <h1>Edit Device</h1>
    <form th:action="@{/device/edit/{id}(id=${device.id})}" th:object="${device}" method="post">
        <label>Type</label>
        <select th:field="*{type}">
            <option value="MRI">MRI</option>
            <option value="CT">CT</option>
            <option value="X-Ray">X-Ray</option>
            <option value="Ultrasound">Ultrasound</option>
            <option value="PET">PET</option>
        </select>

        <label>Location</label>
        <input type="text" th:field="*{location}" placeholder="Device location">

        <div class="page-actions">
            <input type="submit" value="Save">
            <a href="/device/list" class="btn btn-secondary">← Back</a>
            <a href="/" class="btn btn-secondary">🏠 Home</a>
        </div>
    </form>
</div>
</body>
</html>
